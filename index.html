<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注音轉盤遊戲</title>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE"></script>
    <style>
        :root { --bg-color: #FFF9F2; --wheel-border: #fff; }
        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: var(--bg-color);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow-y: auto; padding: 20px 0;
        }
        h1 { color: #666; margin-bottom: 20px; text-align: center; font-weight: 800; letter-spacing: 2px; font-size: 28px; }
        .game-container {
            position: relative; width: 350px; height: 350px;
            display: flex; justify-content: center; align-items: center;
            user-select: none; -webkit-user-select: none;
        }
        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 30px solid #FF6F91; z-index: 100;
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.2));
        }
        .wheel {
            position: absolute; border-radius: 50%;
            transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; background: white;
        }
        .wheel-item {
            position: absolute; top: 0; left: 50%; transform-origin: 50% 100%;
            display: flex; justify-content: center; padding-top: 5px;
            font-weight: bold; color: #333; text-shadow: 1px 1px 0 rgba(255,255,255,0.6);
            box-sizing: border-box; user-select: none;
        }
        .outer-ring  { width: 340px; height: 340px; z-index: 1; font-size: 18px; }
        .outer-ring  .wheel-item { height: 170px; width: 40px; margin-left: -20px; }
        .middle-ring { width: 240px; height: 240px; z-index: 2; font-size: 20px; border: 4px solid var(--wheel-border); }
        .middle-ring .wheel-item { height: 120px; width: 40px; margin-left: -20px; padding-top: 5px; }
        .inner-ring  { width: 140px; height: 140px; z-index: 3; font-size: 24px; border: 4px solid var(--wheel-border); }
        .inner-ring  .wheel-item { height: 70px; width: 60px; margin-left: -30px; padding-top: 15px; }
        .center-btn {
            position: absolute; width: 65px; height: 65px;
            background: radial-gradient(circle at 30% 30%, #FFB7B2, #FF9AA2);
            border-radius: 50%; z-index: 10; border: 5px solid white;
            box-shadow: 0 5px 15px rgba(255,154,162,0.4); cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; color: #333; font-size: 18px; transition: transform 0.1s;
        }
        .center-btn:active { transform: scale(0.95); }
        .result-panel {
            margin-top: 25px; background: white; padding: 20px 35px;
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center; min-width: 280px; z-index: 10;
            border: 2px solid #FFF0F5; display: flex; flex-direction: column; align-items: center;
        }
        .result-labels {
            display: flex; justify-content: space-around;
            font-size: 15px; color: #888; margin-bottom: 8px; font-weight: bold; width: 100%;
        }
        .result-boxes { display: flex; justify-content: center; gap: 12px; }
        .result-box {
            width: 65px; height: 65px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 32px; font-weight: bold; color: #333;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        .box-initial { background-color: #FF9AA2; }
        .box-final   { background-color: #88D8B0; }
        .box-tone    { background-color: #FFDAC1; }
        .full-sound  { margin-top: 15px; font-size: 22px; color: #666; height: 28px; font-weight: bold; }
        .char-hint   { margin-top: 6px; font-size: 16px; color: #aaa; height: 22px; }
        .speak-btn {
            margin-top: 15px; padding: 10px 28px;
            background-color: #4ECDC4; color: white; border: none;
            border-radius: 25px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.2s;
            display: none; align-items: center; gap: 8px;
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        .speak-btn:hover { background-color: #36b9b0; transform: translateY(-2px); }
        .speak-btn:active { transform: translateY(0); }
        @media (max-width: 400px) {
            .game-container { transform: scale(0.85); }
            .result-panel { min-width: 260px; padding: 15px 20px; }
        }
    </style>
</head>
<body>
    <h1>注音轉盤遊戲</h1>
    <div class="game-container">
        <div class="pointer"></div>
        <div class="wheel outer-ring"  id="wheel-initial"></div>
        <div class="wheel middle-ring" id="wheel-final"></div>
        <div class="wheel inner-ring"  id="wheel-tone"></div>
        <div class="center-btn" onclick="spinWheel()">開始</div>
    </div>
    <div class="result-panel">
        <div class="result-labels">
            <span style="width:65px">聲母</span>
            <span style="width:65px">韻母</span>
            <span style="width:65px">聲調</span>
        </div>
        <div class="result-boxes">

            <div class="result-box box-final"   id="res-final">?</div>
            <div class="result-box box-tone"    id="res-tone">?</div>
        </div>
        <div class="full-sound" id="res-text">準備開始...</div>
        <div class="char-hint"  id="res-char"></div>
        <button class="speak-btn" onclick="safeSpeakResult()">🔊 聽發音</button>
    </div>

        'ㄓㄢ':[0,2,3],'ㄓㄣ':[0,2,3],'ㄓㄤ':[0,2,3],'ㄓㄥ':[0,2,3],'ㄓㄨ':[0,1,2,3],
        'ㄔㄚ':[0,1,2,3],'ㄔㄜ':[0,2,3],'ㄔㄞ':[0,1,3],'ㄔㄠ':[0,1,2,3],'ㄔㄡ':[0,1,2,3],

        'ㄕㄚ':[0,2,3],'ㄕㄜ':[0,1,2,3],'ㄕㄞ':[0,3],'ㄕㄠ':[0,1,2,3],'ㄕㄡ':[0,2,3],
        'ㄕㄢ':[0,2,3],'ㄕㄣ':[0,1,2,3],'ㄕㄤ':[0,2,3],'ㄕㄥ':[0,1,2,3],'ㄕㄨ':[0,1,2,3],
        'ㄖㄜ':[3],'ㄖㄠ':[1,2,3],'ㄖㄡ':[1,3],'ㄖㄢ':[1,2,3],'ㄖㄣ':[1,2,3],

        'ㄗㄢ':[0,1,3],'ㄗㄣ':[2],'ㄗㄤ':[0,1,3],'ㄗㄥ':[0,3],'ㄗㄨ':[0,1,2,3],
        'ㄘㄚ':[0,1],'ㄘㄜ':[3],'ㄘㄞ':[0,1,2,3],'ㄘㄠ':[0,2,3],'ㄘㄡ':[0,3],
        'ㄘㄢ':[0,1,2,3],'ㄘㄣ':[0,1],'ㄘㄤ':[0,1,2],'ㄘㄥ':[0,1,2,3],'ㄘㄨ':[0,1,2,3],
        'ㄙㄚ':[0,2,3],'ㄙㄜ':[3],'ㄙㄞ':[0,3],'ㄙㄠ':[0,2,3],'ㄙㄡ':[0,2,3],
        'ㄙㄢ':[0,2,3],'ㄙㄣ':[0],'ㄙㄤ':[0,2,3],'ㄙㄥ':[0],'ㄙㄨ':[0,1,2,3],
    };

    const colors = ['#FF9AA2','#B5EAD7','#FFDAC1','#90CCF4','#F3D250',
                    '#C7CEEA','#FAB1A0','#81ECEC','#FFB7B2','#E2F0CB','#957DAD'];

    let rotInitial = 0, rotFinal = 0, rotTone = 0;
    let speakChar = '';

    const validMap = {};
    initials.forEach(i => validMap[i] = []);
    for (const key in toneDatabase) {
        const i = key[0], f = key.slice(1);
        if (validMap[i] && !validMap[i].includes(f)) validMap[i].push(f);
    }

    function createWheel(id, items) {
        const wheel = document.getElementById(id);
        if (!wheel) return;
        const count = items.length, step = 360 / count;
        let grad = '';
        items.forEach((item, idx) => {
            const s = idx * step, e = (idx + 1) * step;
            grad += `${colors[idx % colors.length]} ${s}deg ${e}deg,`;
            const el = document.createElement('div');
            el.className = 'wheel-item';
            el.style.transform = `rotate(${s + step / 2}deg)`;
            el.innerHTML = typeof item === 'object' ? item.display : item;
            wheel.appendChild(el);
        });
        wheel.style.background = `conic-gradient(${grad.slice(0,-1)})`;
    }

    window.spinWheel = function() {
        const btn = document.querySelector('.center-btn');
        btn.style.pointerEvents = 'none';
        btn.innerText = '...';
        document.querySelector('.speak-btn').style.display = 'none';
        document.getElementById('res-char').innerText = '';

        const target = getRandomValidCombo();

        const calcRot = (idx, count, cur) => {
            const step = 360 / count;
            const center = idx * step + step / 2;
            return (Math.floor(cur / 360) + 5) * 360 + (360 - center);
        };

        rotInitial = calcRot(target.iIdx, initials.length, rotInitial);
        rotFinal   = calcRot(target.fIdx, finals.length,   rotFinal);
        rotTone    = calcRot(target.tIdx, tones.length,    rotTone);

        document.getElementById('wheel-initial').style.transform = `rotate(${rotInitial}deg)`;
        setTimeout(() => document.getElementById('wheel-final').style.transform = `rotate(${rotFinal}deg)`, 200);
        setTimeout(() => document.getElementById('wheel-tone').style.transform  = `rotate(${rotTone}deg)`,  400);
        setTimeout(() => {
            showResult(target.val.i, target.val.f, target.val.t, target.tIdx);
            btn.style.pointerEvents = 'auto';
            btn.innerText = '開始';
        }, 4400);
    };

    window.safeSpeakResult = function() {
        if (!speakChar) return;
        // 用真實中文字發音 → 聲調自然正確
        if (typeof responsiveVoice !== 'undefined' && responsiveVoice.voiceSupport()) {
            responsiveVoice.speak(speakChar, 'Chinese Taiwan Female', { rate: 0.75, pitch: 1.0, volume: 1 });
            return;
        }
        // 備援：Web Speech API
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(speakChar);
            u.lang = 'zh-TW'; u.rate = 0.75;
            window.speechSynthesis.speak(u);
        }
    };

    function getRandomValidCombo() {
        for (let i = 0; i < 500; i++) {
            const ri = initials[Math.floor(Math.random() * initials.length)];
            const af = validMap[ri];
            if (!af || !af.length) continue;
            const rf = af[Math.floor(Math.random() * af.length)];
            const key = ri + rf;
            const at = toneDatabase[key];
            if (!at || !at.length) continue;
            const validT = at.filter(x => x >= 0 && x < tones.length);
            if (!validT.length) continue;
            const rt = validT[Math.floor(Math.random() * validT.length)];
            return { iIdx: initials.indexOf(ri), fIdx: finals.indexOf(rf), tIdx: rt,
                     val: { i: ri, f: rf, t: tones[rt] } };
        }
        return { iIdx:0, fIdx:0, tIdx:0, val:{ i:'ㄅ', f:'ㄚ', t:tones[0] } };
    }

    function showResult(i, f, t, tIdx) {
        document.getElementById('res-initial').innerText = i;
        document.getElementById('res-final').innerText   = f;
        document.getElementById('res-tone').innerText    = t.display;
        document.getElementById('res-text').innerText    = `拼音結果：${i}${f}${t.display.trim()}`;

        // 查對應中文字
        const chars = bopoToChar[i + f];
        const ch = chars ? chars[tIdx] : null;
        speakChar = ch || (i + f);

        document.getElementById('res-char').innerText = ch ? `例字：${ch}` : '';
        document.querySelector('.speak-btn').style.display = 'inline-flex';

        document.querySelectorAll('.result-box').forEach(box => {
            box.style.transform = 'scale(1.1)';
            setTimeout(() => box.style.transform = 'scale(1)', 200);
        });
    }

    createWheel('wheel-initial', initials);
    createWheel('wheel-final',   finals);
    createWheel('wheel-tone',    tones);
});
